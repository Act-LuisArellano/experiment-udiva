experiment:
  type: vqa
  prompt_file: "configs/prompts/vqa_prompt.py"
  output_schema:
    fields:
      action: "string"
      objects: "list"

model:
  name: qwen_omni
  checkpoint: "auto"
  weights_path: "../data-slow/models/Qwen/Qwen2.5-Omni-3B"
  quantization: "none"
  load_kwargs:
    profile: "server"
    device_map: "auto"
    max_memory:
      cuda:0: "46GiB"
      cuda:1: "46GiB"
    torch_dtype: "float16"

data:
  video_path: "../data-fast/videos/vid_00500-00660-remote.mp4"
  chunk_duration: 3.0
  chunk_stride: 3.0
  fps: 1.0
  resize: [112, 112]

execution:
  backend: single_device

output:
  format: json
  path: "../data-slow/results/qwen_vqa_output_server.json"
